<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      margin: 0;
      width: 1280px;
      height: 640px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      box-sizing: border-box;
      position: relative;
      padding: 64px 72px;
    }
    .mark {
      width: 72px;
      height: 72px;
      color: #fff;
      margin-bottom: 108px;
    }
    .title {
      width: 570px;
      font-size: 76px;
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 500;
      text-wrap: balance;
    }
    .meta {
      margin-top: 38px;
      width: 680px;
      color: #8a8a8a;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 31px;
      line-height: 1.25;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <svg class="mark" viewBox="0 0 9 9" fill="currentColor" shape-rendering="crispEdges" aria-hidden="true"><rect x="3" y="0" width="1" height="1" /><rect x="4" y="0" width="1" height="1" /><rect x="5" y="0" width="1" height="1" /><rect x="1" y="1" width="1" height="1" /><rect x="2" y="1" width="1" height="1" /><rect x="6" y="1" width="1" height="1" /><rect x="7" y="1" width="1" height="1" /><rect x="1" y="2" width="1" height="1" /><rect x="7" y="2" width="1" height="1" /><rect x="0" y="3" width="1" height="1" /><rect x="8" y="3" width="1" height="1" /><rect x="0" y="4" width="1" height="1" /><rect x="8" y="4" width="1" height="1" /><rect x="0" y="5" width="1" height="1" /><rect x="8" y="5" width="1" height="1" /><rect x="1" y="6" width="1" height="1" /><rect x="7" y="6" width="1" height="1" /><rect x="1" y="7" width="1" height="1" /><rect x="2" y="7" width="1" height="1" /><rect x="6" y="7" width="1" height="1" /><rect x="7" y="7" width="1" height="1" /><rect x="3" y="8" width="1" height="1" /><rect x="4" y="8" width="1" height="1" /><rect x="5" y="8" width="1" height="1" /></svg>
  <main>
    <div class="title">First Frame Agent</div>
    <div class="meta">BYOK agent app<br>Turn rough product notes into a 9:16 first frame, motion prompt, caption beats, and QA checklist.</div>
  </main>

</html>
